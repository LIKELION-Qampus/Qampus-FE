<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qampus</title>
    <link rel="stylesheet" href="../css/shared.css" />
    <link rel="stylesheet" href="../css/board-list-nonepost.css" />
  </head>
  <body>
    <!--모바일 전용 화면-->
    <div class="app">
      <header class="header">
        <div class="head-left">
          <img class="head-left-img" src="../assets/icons/ChatsCircle.svg" alt="헤더채팅아이콘">
          <h1>질의응답</h1>
        </div>

        <div class="head-right">
          <img class="head-right-img1" src="../assets/icons/search.svg" alt="헤더돋보기아이콘">
          <button>
            <img class="head-right-img2" src="../assets/icons/ellipsis-vertical-b.svg" alt="헤더점세개아이콘">
          </button>
        </div>
      </header>
      
      <div class="popupPostBtn">
        <p>질문 올리기</p>
        <img src="../assets/icons/pencil-b.svg">
      </div>

      <nav class="navigation">
        <div class="selected_category">전체</div>
        <div class="category">수업</div>
        <div class="category">학교 프로그램</div>
        <div class="category">행정 / 절차</div>
      </nav>

      <div class="selected_line"></div>

      <p class="none-post-notice">
        아직 작성된 질문이 없어요. <br/><br/>
        수업에 대해 궁금한 건 무엇이든 질문하세요!
      </p>

      <div class="postBtn">
        <img src="../assets/icons/pencil-w.svg" alt="질문 올리기">
        <p class="uploadQuestion">질문 올리기</p>
      </div>
      
    </div>
  </body>
</html>
